{% extends 'menu.html' %}

{% block css %}

{% endblock %}
{% block title %}Bodegas{% endblock %}

{% block content %}
<h5 class="title is-5">Bodegas</h5>
<div class="container">
    <div class="field is-grouped">
        <p class="control">
            <a id="btnNuevaBodega" class="has-icon button is-normal is-primary">
                <span class="icon"><i class="mdi mdi-plus"></i></span>
                <span>Nueva Bodega</span>
            </a>
        </p>
        <p class="control has-icons-left">
            <input type="text" name="searchInput" id="searchInput" class="input is-normal" placeholder="Filtrar">
            <span class="icon is-left"><i class="mdi mdi-text-search"></i></span>
        </p>
    </div>
    <h6 class="title is-6">Listado de Bodegas</h6>
    <table id="tablaBodegas" class="table is-striped" style="width: 100%;">
        <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Nombre</th>
                <th scope="col">Acciones</th>
            </tr>
        </thead>
        <tbody id="bodegasTbody">

        </tbody>
    </table>
    <nav class="pagination is-small is-centered" role="navigation" aria-label="pagination">
        <ul class="pagination-list" id="paginationList">

        </ul>
    </nav>
</div>

<!-- Modal Nueva Bodega -->
<div id="modalBodega" class="modal is-hidden">
    <div class="modal-background"></div>
    <form id="formBodega" action="#" method="post">
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title">Nueva Bodega</p>
            </header>
            <section class="modal-card-body">
                <div class="field is-horizontal">
                    <div class="field-label">
                        <label for="idBodega" class="label">ID: <strong style="color: red;">*</strong></label>
                    </div>
                    <div class="field-body">
                        <div class="field">
                            <input type="text" name="idBodega" id="idBodega" class="input" required>
                        </div>
                    </div>
                </div>
                <div class="field is-horizontal">
                    <div class="field-label">
                        <label for="nomBodega" class="label">Nombre: <strong style="color: red;">*</strong></label>
                    </div>
                    <div class="field-body">
                        <div class="field">
                            <input type="text" name="nomBodega" id="nomBodega" class="input" required>
                        </div>
                    </div>
                </div>
            </section>
            <footer class="modal-card-foot">
                <div class="buttons">
                    <button id="btnGuardar" type="submit" class="has-icon button is-normal is-success">
                        <span class="icon"><i class="mdi mdi-floppy"></i></span>
                        <span>Guardar</span>
                    </button>
                    <button id="btnActualizar" type="button" class="has-icon button is-normal is-success is-hidden">
                        <span class="icon"><i class="mdi mdi-pencil"></i></span>
                        <span>Actualizar</span>
                    </button>
                    <a id="btnCancelar" class="has-icon button is-normal is-danger">
                        <span class="icon"><i class="mdi mdi-cancel"></i></span>
                        <span>Cancelar</span>
                    </a>
                </div>
            </footer>
        </div>    
    </form>
</div>
{% endblock %}

{% block scripts %}

<script src="{{ url_for('static', filename='js/bodegas/bodegas.js') }}"></script>
{% endblock %}
